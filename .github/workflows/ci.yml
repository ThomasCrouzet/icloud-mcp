name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: gofmt / vet / lint / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          # Always pull the newest 1.25.x patch instead of a cached older one,
          # so govulncheck sees standard-library fixes (e.g. a crypto/tls patch
          # release) without a manual bump.
          check-latest: true

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "Unformatted files (run gofmt -w):"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        env:
          GOLANGCI_LINT_VERSION: v2.1.6
        run: |
          go install "github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}"
          "$(go env GOPATH)/bin/golangci-lint" version
          "$(go env GOPATH)/bin/golangci-lint" run --timeout=5m ./...

      - name: go test (race + coverprofile)
        run: |
          go test ./... -race -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out | tail -1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error
          retention-days: 14

      - name: govulncheck (go.mod vulnerabilities)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: build (linux/amd64 + linux/arm64)
        run: |
          for arch in amd64 arm64; do
            echo "::group::build linux/$arch"
            CGO_ENABLED=0 GOOS=linux GOARCH=$arch \
              go build -trimpath -ldflags='-s -w' -o dist/icloud-mcp-linux-$arch ./cmd/icloud-mcp
            file dist/icloud-mcp-linux-$arch
            echo "::endgroup::"
          done

      - name: security guardrails
        run: |
          # No os/exec anywhere: the server must never execute commands.
          if grep -rn "os/exec" --include='*.go' .; then
            echo "os/exec is forbidden (zero command execution)"
            exit 1
          fi
          # Only allowed network URL: caldav.icloud.com (shards are derived from it);
          # apple.com/ns/ical is an XML namespace (never dereferenced).
          leaks="$(grep -rniE '"https?://' --include='*.go' . \
            | grep -v _test.go \
            | grep -v 'caldav.icloud.com' \
            | grep -v 'apple.com/ns/ical' || true)"
          if [ -n "$leaks" ]; then
            echo "Unauthorized URL detected outside the allowlist:"
            echo "$leaks"
            exit 1
          fi

  secrets:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: gitleaks
        run: |
          # Official gitleaks binary: no license required (private or public
          # repo), unlike gitleaks-action@v2. Scans the working tree and
          # honors inline "gitleaks:allow" annotations.
          VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks dir . --redact --verbose
